  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 cy=\"18\" r=\"2.4\"><\u002Fcircle><circle cx=\"18\" cy=\"18\" r=\"2.4\"><\u002Fcircle><rect x=\"9.5\" y=\"9.5\" width=\"5\" height=\"5\" rx=\"1.2\"><\u002Frect><path d=\"M7.6 7.6 10 10M16.4 7.6 14 10M7.6 16.4 10 14M16.4 16.4 14 14\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n             <h3>Drone<\u002Fh3>\n           <\u002Fdiv>\n           <div class=\"sub\">Terbang otomatis<\u002Fdiv>\n           <p>Rekam video lahan tiap minggu<\u002Fp>\n         <\u002Fdiv>\n         <div class=\"node\" id=\"petugas\">\n           <div class=\"nh\">\n             <span class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><rect x=\"5.5\" y=\"4\" width=\"13\" height=\"17\" rx=\"2\"><\u002Frect><rect x=\"9\" y=\"2.2\" width=\"6\" height=\"3.6\" rx=\"1.1\"><\u002Frect><path d=\"M9 11h6M9 15h4\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n             <h3>Petugas Lapangan<\u002Fh3>\n           <\u002Fdiv>\n           <div class=\"sub\">Web app — form input<\u002Fdiv>\n           <p>kg aktual &amp; dana keluar<\u002Fp>\n         <\u002Fdiv>\n       <\u002Fdiv>\n     <\u002Fsection>\n\n     <!-- STAGE 2: EKSTRAKSI -->\n     <section class=\"stage\">\n       <div class=\"stage-label\">Ekstraksi &amp; Pemrosesan<\u002Fdiv>\n       <div class=\"row cols-3\">\n         <div style=\"display:flex;flex-direction:column;gap:54px;\">\n           <div class=\"node\" id=\"whisper\">\n             <div class=\"nh\"><h3>Whisper<\u002Fh3><\u002Fdiv>\n             <div class=\"sub\">jika input suara<\u002Fdiv>\n             <span class=\"mono\">audio → teks<\u002Fspan>\n           <\u002Fdiv>\n           <div class=\"node\" id=\"llm\">\n             <div class=\"nh\"><h3>LLM — Ekstraksi<\u002Fh3><\u002Fdiv>\n             <span class=\"mono\">→ JSON { kg, kendala }<\u002Fspan>\n           <\u002Fdiv>\n         <\u002Fdiv>\n         <div class=\"node\" id=\"vision\" style=\"align-self:start;\">\n           <div class=\"nh\"><h3>Vision AI<\u002Fh3><\u002Fdiv>\n           <div class=\"sub\">analisis frame video<\u002Fdiv>\n           <span class=\"mono\">% aktif · % idle · % panen<\u002Fspan>\n         <\u002Fdiv>\n         <div class=\"node\" id=\"restapi\" style=\"align-self:start;\">\n           <div class=\"nh\"><h3>REST API<\u002Fh3><\u002Fdiv>\n           <div class=\"sub\">validasi &amp; simpan<\u002Fdiv>\n           <p>Tulis record ke basis data<\u002Fp>\n         <\u002Fdiv>\n       <\u002Fdiv>\n     <\u002Fsection>\n\n     <!-- STAGE 3: DATABASE -->\n     <section class=\"stage\">\n       <div class=\"stage-label\">Basis Data<\u002Fdiv>\n       <div class=\"row db\">\n         <div class=\"spacer\"><\u002Fdiv>\n         <div class=\"node\" id=\"database\" style=\"width:460px;\">\n           <div class=\"nh\">\n             <span class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><ellipse cx=\"12\" cy=\"5.5\" rx=\"7\" ry=\"2.6\"><\u002Fellipse><path d=\"M5 5.5v6c0 1.4 3.1 2.6 7 2.6s7-1.2 7-2.6v-6\"><\u002Fpath><path d=\"M5 11.5v6c0 1.4 3.1 2.6 7 2.6s7-1.2 7-2.6v-6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n             <h3>Basis Data<\u002Fh3>\n           <\u002Fdiv>\n           <div class=\"chips\">\n             <span class=\"mono\">laporan_petani<\u002Fspan>\n             <span class=\"mono\">data_drone<\u002Fspan>\n             <span class=\"mono\">data_petugas<\u002Fspan>\n             <span class=\"mono\">histori_skor<\u002Fspan>\n           <\u002Fdiv>\n         <\u002Fdiv>\n         <div class=\"node sm\" id=\"bmkg\" style=\"width:190px;\">\n           <div class=\"nh\">\n             <span class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><path d=\"M7 17a3.7 3.7 0 0 1 .4-7.4 4.8 4.8 0 0 1 9.2 1.3A3.3 3.3 0 0 1 16.5 17z\"><\u002Fpath><path d=\"M9 20l-.7 1.6M13 20l-.7 1.6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n             <h3>BMKG API<\u002Fh3>\n           <\u002Fdiv>\n           <div class=\"sub\">fetch konteks cuaca<\u002Fdiv>\n         <\u002Fdiv>\n       <\u002Fdiv>\n     <\u002Fsection>\n\n     <!-- STAGE 4: REKONSILIASI -->\n     <section class=\"stage\">\n       <div class=\"stage-label core\">Rekonsiliasi AI — Inti Paten<\u002Fdiv>\n       <div class=\"row\">\n         <div class=\"node core wide\" id=\"rekon\">\n           <span class=\"badge\">Inti Paten<\u002Fspan>\n           <div class=\"nh\">\n             <span class=\"ic\" style=\"color:var(--indigo)\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><path d=\"M12 3l1.7 4.6L18 9l-4.3 1.4L12 15l-1.7-4.6L6 9l4.3-1.4z\"><\u002Fpath><path d=\"M18 15l.7 2 .7-2 .6-.7-.6-.7-.7-2-.7 2-.6.7z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n             <h3>Rekonsiliasi AI<\u002Fh3>\n           <\u002Fdiv>\n           <p style=\"font-weight:600;\">Bandingkan 3 sumber:<\u002Fp>\n           <div class=\"cmp\">\n             <div class=\"pair\"><b>Klaim petani<\u002Fb> <span class=\"arrowx\">⟷<\u002Fspan> <b>drone<\u002Fb><\u002Fdiv>\n             <div class=\"pair\"><b>Drone<\u002Fb> <span class=\"arrowx\">⟷<\u002Fspan> <b>data petugas<\u002Fb><\u002Fdiv>\n             <div class=\"pair\"><b>Semua<\u002Fb> <span class=\"arrowx\">⟷<\u002Fspan> <b>konteks cuaca<\u002Fb><\u002Fdiv>\n           <\u002Fdiv>\n           <p style=\"font-weight:600;margin-top:4px;\">Deteksi anomali:<\u002Fp>\n           <div class=\"quote\">\"klaim 80kg, tapi 70% lahan (drone) belum terpanen\"<\u002Fdiv>\n           <span class=\"mono\" style=\"margin-top:7px;\">output → { anomali, alasan }<\u002Fspan>\n         <\u002Fdiv>\n       <\u002Fdiv>\n     <\u002Fsection>\n\n     <!-- STAGE 5: SCORING -->\n     <section class=\"stage\">\n       <div class=\"stage-label\">Mesin Scoring<\u002Fdiv>\n       <div class=\"row\">\n         <div class=\"node center\" id=\"scoring\" style=\"width:380px;max-width:380px;\">\n           <div class=\"nh\"><h3>Mesin Scoring<\u002Fh3><\u002Fdiv>\n           <div class=\"scorebar\">\n             <i style=\"width:30%;background:#54534C;\"><\u002Fi>\n             <i style=\"width:30%;background:#76746B;\"><\u002Fi>\n             <i style=\"width:25%;background:#9C998F;\"><\u002Fi>\n             <i style=\"width:15%;background:#C2BFB4;\"><\u002Fi>\n           <\u002Fdiv>\n           <div class=\"seg-list\">\n             <div class=\"r\"><span class=\"k\"><span class=\"swatch\" style=\"background:#54534C;\"><\u002Fspan>Laporan rutin<\u002Fspan><span class=\"v\">× 30%<\u002Fspan><\u002Fdiv>\n             <div class=\"r\"><span class=\"k\"><span class=\"swatch\" style=\"background:#76746B;\"><\u002Fspan>Akurasi klaim<\u002Fspan><span class=\"v\">× 30%<\u002Fspan><\u002Fdiv>\n             <div class=\"r\"><span class=\"k\"><span class=\"swatch\" style=\"background:#9C998F;\"><\u002Fspan>Histori panen<\u002Fspan><span class=\"v\">× 25%<\u002Fspan><\u002Fdiv>\n             <div class=\"r\"><span class=\"k\"><span class=\"swatch\" style=\"background:#C2BFB4;\"><\u002Fspan>Rekam jejak<\u002Fspan><span class=\"v\">× 15%<\u002Fspan><\u002Fdiv>\n           <\u002Fdiv>\n           <div class=\"total\"><span>Total skor<\u002Fspan><b>0 – 100<\u002Fb><\u002Fdiv>\n         <\u002Fdiv>\n       <\u002Fdiv>\n     <\u002Fsection>\n\n     <!-- STAGE 6: KEPUTUSAN -->\n     <section class=\"stage\">\n       <div class=\"stage-label\">Keputusan<\u002Fdiv>\n       <div class=\"row cols-3\">\n         <div class=\"node branch b-g\" id=\"cair\">\n           <div class=\"nh\"><h3>CAIR<\u002Fh3><span class=\"tag\">80–100<\u002Fspan><\u002Fdiv>\n           <ul>\n             <li>Notifikasi WA ke petugas<\u002Fli>\n             <li>Petugas cairkan dana<\u002Fli>\n           <\u002Ful>\n           <div class=\"outcome g\">✓ Dana cair<\u002Fdiv>\n         <\u002Fdiv>\n         <div class=\"node branch b-a\" id=\"review\">\n           <div class=\"nh\"><h3>REVIEW MANUAL<\u002Fh3><span class=\"tag\">50–79<\u002Fspan><\u002Fdiv>\n           <ul>\n             <li>Flag ke pengawas<\u002Fli>\n             <li>Pengawas putuskan<\u002Fli>\n           <\u002Ful>\n         <\u002Fdiv>\n         <div class=\"node branch b-r\" id=\"tahan\">\n           <div class=\"nh\"><h3>TAHAN<\u002Fh3><span class=\"tag\">0–49<\u002Fspan><\u002Fdiv>\n           <ul>\n             <li>Alasan dikirim ke WA petani<\u002Fli>\n           <\u002Ful>\n         <\u002Fdiv>\n       <\u002Fdiv>\n\n       <div class=\"row sub\" style=\"margin-top:54px;\">\n         <div><\u002Fdiv>\n         <div class=\"node sm\" id=\"pengawas\">\n           <div class=\"nh\"><h3>Pengawas Memutuskan<\u002Fh3><\u002Fdiv>\n           <div class=\"sub\">tinjau bukti &amp; anomali<\u002Fdiv>\n         <\u002Fdiv>\n         <div class=\"node sm\" id=\"sanggah\">\n           <div class=\"nh\"><h3>Form Sanggah Petani<\u002Fh3><\u002Fdiv>\n           <div class=\"sub\">ajukan bukti tambahan<\u002Fdiv>\n         <\u002Fdiv>\n       <\u002Fdiv>\n\n       <div class=\"row\" style=\"margin-top:54px;\">\n         <div class=\"node center pill\" id=\"final\" style=\"text-align:center;align-items:center;max-width:360px;\">\n           <div class=\"nh\" style=\"justify-content:center;\"><h3>KEPUTUSAN FINAL<\u002Fh3><\u002Fdiv>\n           <div class=\"sub\" style=\"font-size:14px;\">cair &nbsp;/&nbsp; tetap tahan<\u002Fdiv>\n         <\u002Fdiv>\n       <\u002Fdiv>\n     <\u002Fsection>\n\n   <\u002Fdiv><!-- /flow -->\n\n   <div class=\"foot\">Diagram alur sistem · Smart Farm · skema verifikasi subsidi panen<\u002Fdiv>\n\n  <\u002Fdiv><!-- /canvas -->\n <\u002Fdiv><!-- /scaler -->\n<\u002Fdiv><!-- /viewport -->\n\n<script>\nconst CANVAS_W = 1180;\nconst flow = document.getElementById('flow');\nconst svg  = document.getElementById('wires');\nconst NS = 'http://www.w3.org/2000/svg';\n\nconst edges = [\n  {f:'petani',  t:'whisper', label:'teks / suara'},\n  {f:'whisper', t:'llm',     label:'→ teks'},\n  {f:'drone',   t:'vision'},\n  {f:'petugas', t:'restapi'},\n  {f:'llm',     t:'database'},\n  {f:'vision',  t:'database'},\n  {f:'restapi', t:'database'},\n  {f:'bmkg',    t:'database', type:'h', label:'+ cuaca'},\n  {f:'database',t:'rekon'},\n  {f:'rekon',   t:'scoring'},\n  {f:'scoring', t:'cair',   label:'80–100', lp:'target'},\n  {f:'scoring', t:'review', label:'50–79',  lp:'target'},\n  {f:'scoring', t:'tahan',  label:'0–49',   lp:'target'},\n  {f:'review',  t:'pengawas'},\n  {f:'tahan',   t:'sanggah'},\n  {f:'pengawas',t:'final'},\n  {f:'sanggah', t:'final'},\n];\n\nfunction rel(node){\n  let x=0,y=0,el=node;\n  while(el && el!==flow){ x+=el.offsetLeft; y+=el.offsetTop; el=el.offsetParent; }\n  return {x,y,w:node.offsetWidth,h:node.offsetHeight,\n          cx:x+node.offsetWidth/2, cy:y+node.offsetHeight/2,\n          top:y, bottom:y+node.offsetHeight, left:x, right:x+node.offsetWidth};\n}\n\nfunction elbowVHV(sx,sy,tx,ty,r){\n  if(Math.abs(tx-sx)<1.5) return `M ${sx} ${sy} L ${tx} ${ty}`;\n  const my=(sy+ty)/2, dir=tx>sx?1:-1;\n  return `M ${sx} ${sy} L ${sx} ${my-r} Q ${sx} ${my} ${sx+dir*r} ${my} `+\n         `L ${tx-dir*r} ${my} Q ${tx} ${my} ${tx} ${my+r} L ${tx} ${ty}`;\n}\n\nfunction addPath(d){\n  const p=document.createElementNS(NS,'path');\n  p.setAttribute('d',d);\n  p.setAttribute('fill','none');\n  p.setAttribute('stroke','var(--conn)');\n  p.setAttribute('stroke-width','1.6');\n  p.setAttribute('marker-end','url(#arr)');\n  svg.appendChild(p);\n}\nfunction addLabel(x,y,txt){\n  const t=document.createElementNS(NS,'text');\n  t.setAttribute('x',x); t.setAttribute('y',y);\n  t.setAttribute('text-anchor','middle');\n  t.setAttribute('dominant-baseline','middle');\n  t.setAttribute('font-family','Hanken Grotesque, sans-serif');\n  t.setAttribute('font-size','12');\n  t.setAttribute('font-weight','600');\n  t.setAttribute('fill','var(--soft)');\n  t.setAttribute('stroke','var(--paper)');\n  t.setAttribute('stroke-width','4.5');\n  t.setAttribute('paint-order','stroke');\n  t.textContent=txt;\n  svg.appendChild(t);\n}\n\nfunction draw(){\n  // clear old paths/labels (keep defs)\n  [...svg.querySelectorAll('path:not(defs path),text')].forEach(n=>{\n    if(n.closest('defs')) return; n.remove();\n  });\n  const W=flow.offsetWidth, H=flow.offsetHeight;\n  svg.setAttribute('width',W); svg.setAttribute('height',H);\n  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);\n\n  edges.forEach(e=>{\n    const a=rel(document.getElementById(e.f));\n    const b=rel(document.getElementById(e.t));\n    if(e.type==='h'){\n      const sx=a.left, sy=a.cy, tx=b.right+3, ty=b.cy;\n      addPath(`M ${sx} ${sy} L ${tx} ${ty}`);\n      if(e.label) addLabel((sx+tx)/2,(sy+ty)/2-9,e.label);\n    } else {\n      const sx=a.cx, sy=a.bottom, tx=b.cx, ty=b.top-3;\n      addPath(elbowVHV(sx,sy,tx,ty,9));\n      if(e.label){\n        if(e.lp==='target') addLabel(tx,ty-13,e.label);\n        else if(Math.abs(tx-sx)<1.5) addLabel(sx,(sy+ty)/2,e.label);\n        else addLabel((sx+tx)/2,(sy+ty)/2,e.label);\n      }\n    }\n  });\n}\n\nfunction fit(){\n  const s=Math.min(1,(window.innerWidth-20)/CANVAS_W);\n  const scaler=document.getElementById('scaler');\n  const canvas=document.getElementById('canvas');\n  scaler.style.transform=`translateX(-50%) scale(${s})`;\n  document.getElementById('viewport').style.height=(canvas.offsetHeight*s)+'px';\n}\n\nfunction refresh(){ draw(); fit(); }\nwindow.addEventListener('resize', refresh);\nwindow.addEventListener('load', refresh);\nif(document.fonts && document.fonts.ready){ document.fonts.ready.then(refresh); }\nrefresh();\nsetTimeout(refresh, 350);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
